<div class="container py-3">
    <div class="d-flex align-items-center justify-content-between gap-2 mb-3">
        <div>
            <h3 class="mb-1">Router Guards</h3>
            <p class="text-muted mb-0">canActivate, canDeactivate, and auth checks</p>
        </div>

        <a class="btn btn-outline-secondary" routerLink="/home">← Back</a>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <h5 class="mb-2">What are Router Guards?</h5>
            <ul class="text-muted mb-0">
                <li *ngFor="let d of definition">{{ d }}</li>
            </ul>
        </div>
    </div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <h5 class="mb-2">canActivate</h5>
            <ul class="text-muted mb-2">
                <li *ngFor="let p of canActivateInfo">{{ p }}</li>
            </ul>
            <pre class="code-box mb-0"><code>{{ canActivateCode }}</code></pre>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h5 class="mb-2">canDeactivate</h5>
            <ul class="text-muted mb-2">
                <li *ngFor="let p of canDeactivateInfo">{{ p }}</li>
            </ul>
            <pre class="code-box mb-0"><code>{{ canDeactivateCode }}</code></pre>
        </div>
    </div>

    <div class="card shadow-sm mt-3">
        <div class="card-body">
            <h5 class="mb-2">Try the Demos</h5>
            <div class="d-flex gap-2 flex-wrap">
                <a class="btn btn-outline-primary" routerLink="/admin">Open Protected Route</a>
                <a class="btn btn-outline-warning" routerLink="/unsaved-form">Unsaved Form Demo</a>
            </div>
        </div>
    </div>
</div>
