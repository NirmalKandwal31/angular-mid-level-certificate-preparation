<!-- eslint-disable @angular-eslint/template/prefer-control-flow -->
<div class="search-shell">
    <div class="search-icon">⌕</div>

    <input type="text" class="search-input" [placeholder]="placeholder" [ngModel]="value"
        (ngModelChange)="onInput($event)" />

    <button *ngIf="value" class="clear-btn" type="button" (click)="clear()">
        Clear
    </button>
</div>
