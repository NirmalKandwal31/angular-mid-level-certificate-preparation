<div class="card h-100 topic-card" [class.topic-card-active]="isOpen" role="button" tabindex="0"
    [attr.aria-expanded]="isOpen" (click)="onCardClick()" (keydown.enter)="onCardClick()"
    (keydown.space)="$event.preventDefault(); onCardClick()">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <h5 class="mb-0 fw-bold text-dark">{{ title }}</h5>
            <span class="badge bg-primary">{{ itemCount }}</span>
        </div>

        <p class="text-muted mb-3">{{ description }}</p>

        <div class="d-flex justify-content-between align-items-center">
            <small class="text-primary fw-semibold">
                {{ isOpen ? 'Opened' : 'Explore topics' }}
            </small>

            <small class="text-muted">
                {{ isOpen ? '▼' : '▶' }}
            </small>
        </div>
    </div>
</div>
