<!-- eslint-disable @angular-eslint/template/prefer-control-flow -->
<div class="container py-4">
    <ng-container *ngIf="topic() as topic; else notFound">
        <div class="topic-detail-shell">
            <div class="topic-detail-topbar">
                <button class="btn btn-outline-secondary btn-sm" (click)="goBack()">
                    ← Back
                </button>

                <span class="topic-chip">Interview Prep Topic</span>
            </div>

            <section class="topic-hero">
                <h1 class="topic-page-title">{{ topic.title }}</h1>
                <p class="topic-page-subtitle">{{ topic.description }}</p>

                <div class="topic-hero-actions">
                    <button class="btn btn-primary" disabled>
                        Ask AI About This Topic
                    </button>
                    <button class="btn btn-outline-primary" disabled>
                        Generate Questions
                    </button>
                </div>
            </section>

            <section class="topic-section" *ngIf="topic.overview">
                <h3 class="section-title">Overview</h3>
                <p class="section-text mb-0">{{ topic.overview }}</p>
            </section>

            <section class="topic-section" *ngIf="topic.keyPoints?.length">
                <h3 class="section-title">Key Points</h3>
                <ul class="styled-list mb-0">
                    <li *ngFor="let point of topic.keyPoints">{{ point }}</li>
                </ul>
            </section>

            <section class="topic-section" *ngIf="topic.interviewTips?.length">
                <h3 class="section-title">Interview Tips</h3>
                <ul class="styled-list mb-0">
                    <li *ngFor="let tip of topic.interviewTips">{{ tip }}</li>
                </ul>
            </section>
        </div>
    </ng-container>

    <ng-template #notFound>
        <div class="topic-detail-shell">
            <h3 class="mb-2">Topic not found</h3>
            <p class="text-muted mb-3">The requested topic could not be found.</p>
            <button class="btn btn-outline-secondary btn-sm" (click)="goBack()">
                Go Back
            </button>
        </div>
    </ng-template>
</div>
